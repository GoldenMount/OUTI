<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OUTI - 户外人格测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c08;--card:#111a11;--card2:#182418;--accent:#4ade80;--accent2:#22c55e;--accent-dim:#166534;--text:#e2f0e2;--text-dim:#7a9a7a;--border:#1e331e;--warn:#f59e0b;--danger:#ef4444}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 80%,rgba(34,197,94,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(74,222,128,.04) 0%,transparent 50%)}
.mountain-bg{position:fixed;bottom:0;left:0;width:100%;height:180px;z-index:0;opacity:.12}
.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px;min-height:100vh}

.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;animation:fadeIn .8s ease}
.logo{font-size:68px;font-weight:900;letter-spacing:-3px;background:linear-gradient(135deg,#4ade80,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
.logo::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:50px;height:3px;background:var(--accent);border-radius:2px}
.subtitle{font-size:13px;color:var(--text-dim);margin-top:24px;letter-spacing:3px}
.splash-badge{display:inline-block;margin-top:16px;padding:5px 14px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15);border-radius:20px;font-size:12px;color:var(--accent)}
.splash-desc{margin-top:28px;font-size:14px;color:var(--text-dim);line-height:1.9;max-width:300px}
.start-btn{margin-top:36px;padding:15px 44px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:2px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.3)}
.splash-disclaimer{margin-top:20px;font-size:11px;color:rgba(122,154,122,.4)}

.quiz{display:none;animation:fadeIn .5s ease}
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .5s ease}
.q-counter{font-size:11px;color:var(--text-dim);margin-bottom:6px;letter-spacing:2px}
.q-text{font-size:18px;font-weight:700;line-height:1.7;margin-bottom:28px;min-height:60px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:14px;line-height:1.6;cursor:pointer;transition:all .3s;text-align:left;position:relative;overflow:hidden}
.option-btn::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:0;transition:opacity .3s}
.option-btn:hover{background:var(--card2);border-color:var(--accent-dim);transform:translateX(3px)}
.option-btn:hover::before{opacity:1}
.option-btn.selected{background:rgba(74,222,128,.08);border-color:var(--accent)}
.option-btn.selected::before{opacity:1}

.result{display:none;animation:fadeIn .8s ease;padding-bottom:50px}
.result-header{text-align:center;padding:24px 0}
.result-tag{display:inline-block;padding:5px 14px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15);border-radius:20px;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:14px}
.result-type{font-size:44px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.result-name{font-size:20px;font-weight:700;margin-bottom:2px}
.result-alias{font-size:13px;color:var(--text-dim);font-style:italic}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin:16px 0}
.result-desc{font-size:14px;line-height:1.9;color:var(--text);margin-bottom:16px}
.result-quote{font-size:15px;font-weight:700;color:var(--accent);text-align:center;padding:14px;background:rgba(74,222,128,.04);border-radius:12px;border-left:3px solid var(--accent);margin-bottom:16px;line-height:1.6}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.stat-item{background:rgba(74,222,128,.04);border-radius:12px;padding:14px;text-align:center}
.stat-value{font-size:20px;font-weight:900;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:3px;letter-spacing:1px}
.section-title{font-size:13px;font-weight:700;color:var(--text-dim);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.trait-list{list-style:none;margin-bottom:16px}
.trait-list li{padding:8px 0;border-bottom:1px solid rgba(30,51,30,.5);font-size:13px;line-height:1.6;color:var(--text)}
.trait-list li:last-child{border-bottom:none}
.warning-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:12px;padding:14px;margin:14px 0;font-size:12px;color:#fbbf24;line-height:1.7}
.match-item{display:flex;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.match-type{font-size:18px;font-weight:900;color:var(--accent);margin-right:10px;min-width:50px}
.match-info{flex:1}
.match-name{font-size:13px;font-weight:700}
.match-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.share-area{text-align:center;margin-top:24px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:18px}
.share-title{font-size:13px;color:var(--text-dim);margin-bottom:14px;letter-spacing:1px}
.share-btn{display:inline-block;padding:11px 28px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;margin:0 4px}
.share-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,197,94,.3)}
.retry-btn{display:inline-block;padding:11px 28px;background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:50px;font-size:14px;cursor:pointer;transition:all .3s;margin:0 4px}
.retry-btn:hover{border-color:var(--text-dim);color:var(--text)}
.atlas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.atlas-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:10px 6px 8px;text-align:center;transition:all .3s;cursor:default}
.atlas-item:hover{background:rgba(255,255,255,.05);transform:translateY(-2px)}
.atlas-active{background:rgba(74,222,128,.08)!important;border-color:rgba(74,222,128,.25)!important;box-shadow:0 0 12px rgba(74,222,128,.1)}
.atlas-avatar{width:48px;height:56px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px}
.atlas-avatar img{width:100%;height:100%;object-fit:cover}
.atlas-code{font-size:12px;font-weight:900;color:var(--c,#7a9a7a);letter-spacing:1px}
.atlas-active .atlas-code{color:#4ade80}
.atlas-name{font-size:9px;color:var(--text-dim);margin-top:1px;letter-spacing:.5px}
.atlas-active .atlas-name{color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease forwards}
::-webkit-scrollbar{width:0}
@media(max-width:360px){.logo{font-size:52px}.result-type{font-size:34px}.q-text{font-size:16px}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<svg class="mountain-bg" viewBox="0 0 1440 180" preserveAspectRatio="none">
<path d="M0,180 L0,110 Q120,30 240,90 Q360,15 480,75 Q560,25 640,80 Q720,5 800,65 Q900,20 1000,78 Q1080,10 1160,68 Q1260,30 1360,88 L1440,55 L1440,180Z" fill="rgba(74,222,128,.12)"/>
<path d="M0,180 L0,140 Q180,70 360,120 Q480,60 600,110 Q720,50 840,100 Q960,45 1080,90 Q1200,55 1320,105 L1440,80 L1440,180Z" fill="rgba(34,197,94,.08)"/>
</svg>

<div class="container">
<div class="splash" id="splash">
<div class="logo">OUTI</div>
<div class="subtitle">Outdoor Unhealthy Test Index</div>
<div class="splash-badge">MBTI已过时 OUTI来了</div>
<div class="splash-desc">
零心理学依据，零登山指导意义<br>
纯粹测测你在山野里的精神状态<br><br>
16道题，2分钟，揭晓你的户外人格<br>
16种人格，总有一款扎你心
</div>
<button class="start-btn" onclick="startQuiz()">进 山</button>
<div class="splash-disclaimer">本测试纯属娱乐，如有雷同说明你也病得不轻</div>
</div>

<div class="quiz" id="quiz">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="q-counter" id="qCounter">01 / 16</div>
<div class="q-text" id="qText"></div>
<div class="options" id="options"></div>
</div>

<div class="result" id="result"></div>
</div>

;

// ===== 16种户外人格定义 =====
const types={
TRK:{code:"TRK",name:"山瘾者",alias:"Trackhead / 人形步数机器",icon:"🏔️",color:"#4ade80",
desc:"你上瘾了。不是对风景，不是对社交，是对'走'这件事本身。周末没有'休息'这个选项，只有'去哪座山'。朋友约饭你说没空，朋友约山你秒回。你不是在享受户外，你是在完成一种身体必须执行的程序。爬山对你来说不是逃离日常，而是回归本位——你的出厂设置里就没有'宅家'这个选项。",

goodMatch:{code:"NRD",name:"野路子",desc:"帮你规划路线，救你于迷途"},

},
NRD:{code:"NRD",name:"野路子",alias:"Nerd / 人形等高线",icon:"🧭",color:"#60a5fa",
desc:"你是户外圈的技术宅。别人看山是山，你看山是坡度、海拔、地表覆盖类型和潜在风险点。你的背包像个移动指挥站，你的大脑装着方圆50公里的地形数据。你不是不享受风景，只是更享受掌控感。队友迷路找你，天气变脸找你，装备出问题还找你——你是队伍的定海神针，但你自己知道，你只是害怕失控。",

goodMatch:{code:"GVH",name:"硬撑侠",desc:"你规划，TA硬撑，完美互补"},
badMatch:{code:"PHT",name:"出片狂",desc:"TA让你等拍照等到崩溃"}
},
PHT:{code:"PHT",name:"出片狂",alias:"Photoholic / 朋友圈登山运动员",icon:"📸",color:"#f472b6",
desc:"你的登山速度取决于光线变化，配速单位是'每公里几张图'。冲锋衣要搭配色，登山杖要上镜，头盔影响发型可以不戴——但请戴。你不是在爬山，你是在制作一条视觉叙事。照片经过5层滤镜，文案经过3轮推敲，但登山杖用法还不太熟练。九宫格一出，谁还在乎你中途喘成什么样？",

let currentQ=0;
let scores={};

function startQuiz(){
  document.getElementById('splash').style.display='none';
  document.getElementById('quiz').style.display='block';
  currentQ=0;
  scores={};
  for(let k in types) scores[k]=0;
  renderQ();
}

function renderQ(){
  const q=questions[currentQ];
  const fill=(currentQ/questions.length)*100;
  document.getElementById('progressFill').style.width=fill+'%';
  document.getElementById('qCounter').textContent=
    String(currentQ+1).padStart(2,'0')+' / '+String(questions.length).padStart(2,'0');
  document.getElementById('qText').textContent=q.text;
  const oc=document.getElementById('options');
  oc.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='option-btn fade-in';
    b.style.animationDelay=(i*0.08)+'s';
    b.textContent=o.t;
    b.onclick=()=>selOpt(i);
    oc.appendChild(b);
  });
}

function selOpt(i){
  const q=questions[currentQ];
  const o=q.opts[i];
  for(let k in o.s) scores[k]=(scores[k]||0)+o.s[k];
  const btns=document.querySelectorAll('.option-btn');
  btns[i].classList.add('selected');
  btns.forEach(b=>b.style.pointerEvents='none');
  setTimeout(()=>{
    currentQ++;
    if(currentQ<questions.length) renderQ();
    else showResult();
  },350);
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  let maxT='TRK',maxS=0;
  for(let k in scores){if(scores[k]>maxS){maxS=scores[k];maxT=k;}}
  const t=types[maxT];
  let sh='';
  t.stats.forEach(s=>{sh+=`<div class="stat-item"><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div>`;});
  let th='';
  t.traits.forEach((x,i)=>{th+=`<li><span style="color:var(--accent);margin-right:6px">${i+1}.</span>${x}</li>`;});
  const gm=types[t.goodMatch.code],bm=types[t.badMatch.code];
  document.getElementById('result').innerHTML=`
<div class="result-header fade-in">
<div class="result-tag">你的户外人格</div>
<div class="result-type">${t.code}</div>
<div class="result-name">${t.icon} ${t.name}</div>
<div class="result-alias">${t.alias}</div>
</div>
<div class="result-card fade-in" style="animation-delay:.15s">
<div class="result-desc">${t.desc}</div>
<div class="result-quote">${t.quote}</div>
</div>
<div class="stats-grid fade-in" style="animation-delay:.25s">${sh}</div>
<div class="result-card fade-in" style="animation-delay:.35s">
<div class="section-title">临床诊断</div>
<ul class="trait-list">${th}</ul>
</div>
<div class="warning-box fade-in" style="animation-delay:.45s">⚠️ ${t.warning}</div>
<div class="result-card fade-in" style="animation-delay:.55s">
<div class="section-title">组队推荐</div>
<div class="match-item">
<div class="match-type" style="color:${gm.color}">${gm.icon} ${gm.code}</div>
<div class="match-info"><div class="match-name">${gm.name}</div><div class="match-desc">${t.goodMatch.desc}</div></div>
</div>
<div class="match-item">
<div class="match-type" style="color:${bm.color}">${bm.icon} ${bm.code}</div>
<div class="match-info"><div class="match-name">${bm.name}</div><div class="match-desc">${t.badMatch.desc}</div></div>
</div>
</div>
<div class="result-card fade-in" style="animation-delay:.65s">
<div class="section-title">全图鉴</div>
<div class="atlas-grid">
${Object.values(types).map(x=>`<div class="atlas-item ${x.code===maxT?'atlas-active':''}" style="--c:${x.color}">
<div class="atlas-avatar"><img src="${avatars[x.code]}" alt="${x.name}"></div>
<div class="atlas-code">${x.code}</div>
<div class="atlas-name">${x.name}</div>
</div>`).join('')}
</div>
</div>
<div class="share-area fade-in" style="animation-delay:.75s">
<div class="share-title">测完别忘了晒 · 分享你的户外人格</div>
<button class="share-btn" onclick="copyResult('${t.code}','${t.name}')">复制结果</button>
<button class="retry-btn" onclick="retryQuiz()">再测一次</button>
</div>`;
}

function copyResult(code,name){
  const txt=`🏔️ OUTI户外人格测试\n我的结果是：${code} - ${name}\n\n零心理学依据，零登山指导意义\n纯粹测测你在山野里的精神状态\n16种人格，总有一款扎你心\n\n👉 来测测你的户外人格`;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(showToast);}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
}
function showToast(){
  const d=document.createElement('div');
  d.textContent='已复制到剪贴板！';
  d.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.9);color:#000;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:700;z-index:9999';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}
function retryQuiz(){
  document.getElementById('result').style.display='none';
  document.getElementById('splash').style.display='flex';
  currentQ=0;scores={};
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='block'){
    const n=parseInt(e.key);
    if(n>=1&&n<=4){const b=document.querySelectorAll('.option-btn');if(b[n-1])b[n-1].click();}
  }
});
</script>
